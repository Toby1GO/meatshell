name: Release

# Build the Windows desktop package.
#  - Push a tag like `v0.4.20` -> attaches the Windows archives to that Release.
#  - Run manually -> enter a version, e.g. `0.4.20` or `v0.4.20`; the workflow
#    creates / updates that GitHub Release and uploads the Windows artifacts.

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      version:
        description: "Release version, e.g. 0.4.20 or v0.4.20"
        required: true
        type: string

permissions:
  contents: write   # needed to create / update the GitHub Release

jobs:
  build:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            name: windows-x86_64
            bin: meatshell.exe

    steps:
      - uses: actions/checkout@v4

      - name: Resolve release version
        shell: bash
        run: |
          set -eu
          VERSION="${{ github.event_name == 'workflow_dispatch' && inputs.version || github.ref_name }}"
          VERSION="${VERSION#refs/tags/}"
          VERSION="${VERSION#"${VERSION%%[![:space:]]*}"}"
          VERSION="${VERSION%"${VERSION##*[![:space:]]}"}"
          if [ -z "$VERSION" ]; then
            echo "version is required" >&2
            exit 1
          fi
          case "$VERSION" in
            v*) TAG="$VERSION" ;;
            *) TAG="v$VERSION" ;;
          esac
          echo "VERSION=$TAG" >> "$GITHUB_ENV"
          echo "VERSION_NUM=${TAG#v}" >> "$GITHUB_ENV"

      - name: Check Cargo version
        shell: bash
        run: |
          set -eu
          CARGO_VERSION="$(grep -m1 '^version = ' Cargo.toml | sed -E 's/version = "([^"]+)"/\1/')"
          if [ "$CARGO_VERSION" != "$VERSION_NUM" ]; then
            echo "Cargo.toml version ($CARGO_VERSION) does not match release version ($VERSION_NUM)." >&2
            echo "Update Cargo.toml before publishing so the app reports the correct version." >&2
            exit 1
          fi

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo build
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Build (release)
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package
        shell: bash
        run: |
          set -eu
          STAGE="meatshell-${VERSION}-${{ matrix.name }}"
          mkdir "$STAGE"
          cp "target/${{ matrix.target }}/release/${{ matrix.bin }}" "$STAGE/"
          cp README.md README.en.md CHANGELOG.md "$STAGE/" 2>/dev/null || true
          7z a "${STAGE}.zip" "$STAGE" >/dev/null
          echo "ASSET=${STAGE}.zip" >> "$GITHUB_ENV"

      # MSI installer with a "choose install location" wizard (WixUI_InstallDir).
      # Best-effort: if the WiX/cargo-wix tooling hiccups it must not block the
      # .zip release, hence continue-on-error.
      - name: Build MSI installer (Windows)
        if: matrix.name == 'windows-x86_64'
        continue-on-error: true
        shell: pwsh
        run: |
          $VERSION = "$env:VERSION"
          # WiX 3 toolset (candle/light) that cargo-wix drives.
          choco install wixtoolset -y --no-progress
          $candle = Get-ChildItem "C:\Program Files (x86)\WiX Toolset*\bin\candle.exe" -ErrorAction SilentlyContinue | Select-Object -First 1
          if ($candle) { $env:PATH = "$($candle.DirectoryName);$env:PATH" }
          cargo install cargo-wix --locked
          cargo wix --no-build --nocapture --target ${{ matrix.target }} --output "meatshell-$VERSION-windows-x86_64.msi"
          echo "MSI=meatshell-$VERSION-windows-x86_64.msi" >> $env:GITHUB_ENV

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: ${{ env.ASSET }}

      - name: Upload MSI artifact
        if: matrix.name == 'windows-x86_64' && env.MSI != ''
        uses: actions/upload-artifact@v4
        with:
          name: windows-x86_64-msi
          path: ${{ env.MSI }}

      - name: Attach to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.VERSION }}
          name: meatshell ${{ env.VERSION }}
          target_commitish: ${{ github.sha }}
          files: ${{ env.ASSET }}
          fail_on_unmatched_files: true

      - name: Attach MSI to GitHub Release
        if: matrix.name == 'windows-x86_64' && env.MSI != ''
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.VERSION }}
          name: meatshell ${{ env.VERSION }}
          target_commitish: ${{ github.sha }}
          files: ${{ env.MSI }}
          fail_on_unmatched_files: false
